[build]
builder = "RAILPACK"
buildCommand = "pnpm build:worker"
watchPatterns = [
  "/apps/worker/**",
  "/packages/db/**",
  "/packages/shared/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/tsconfig.base.json"
]

[deploy]
preDeployCommand = "pnpm db:deploy"
startCommand = "pnpm --filter @review-pilot/worker start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
