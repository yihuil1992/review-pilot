[build]
builder = "RAILPACK"
buildCommand = "pnpm build:web"
watchPatterns = [
  "/apps/web/**",
  "/packages/shared/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/tsconfig.base.json"
]

[deploy]
startCommand = "pnpm --filter @review-pilot/web start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
