[build]
builder = "RAILPACK"
buildCommand = "pnpm build:api"
watchPatterns = [
  "/apps/api/**",
  "/packages/db/**",
  "/packages/shared/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/tsconfig.base.json"
]

[deploy]
preDeployCommand = "pnpm db:deploy"
startCommand = "pnpm --filter @review-pilot/api start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
