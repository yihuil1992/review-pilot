services:
  postgres:
    image: postgres:16-alpine
    container_name: review-pilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: review_pilot
      POSTGRES_PASSWORD: review_pilot
      POSTGRES_DB: review_pilot
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review_pilot -d review_pilot"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: review-pilot-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  redis-data:
